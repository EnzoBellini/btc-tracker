# Railway: defina Root Directory = . (raiz do repositório), não apps/landing.
# O pacote @trackion/billing é workspace local em packages/billing.
[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build --workspace=@trackion/landing"

[deploy]
startCommand = "npm run start --workspace=@trackion/landing"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
